spring:
  application:
    name: study-planner-server
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/study_planner}
    username: ${DB_USERNAME:study_planner}
    password: ${DB_PASSWORD:study_planner}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8080}
  ssl:
    enabled: ${SSL_ENABLED:false}
    key-store: ${SSL_KEY_STORE:}
    key-store-password: ${SSL_KEY_STORE_PASSWORD:}
    key-store-type: ${SSL_KEY_STORE_TYPE:PKCS12}

app:
  security:
    jwt-secret: ${JWT_SECRET:change-this-secret-to-at-least-32-characters}
    jwt-ttl-minutes: ${JWT_TTL_MINUTES:120}
  admin:
    email: ${ADMIN_EMAIL:}
    password: ${ADMIN_PASSWORD:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
